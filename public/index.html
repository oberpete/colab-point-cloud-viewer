<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Collaborative Point Cloud Viewer</title>

  <!-- Potree core styles -->
  <link rel="stylesheet" href="potree/build/potree/potree.css">
  <link rel="stylesheet" href="potree/libs/jquery-ui/jquery-ui.min.css">
  <link rel="stylesheet" href="potree/libs/openlayers3/ol.css">
  <link rel="stylesheet" href="potree/libs/spectrum/spectrum.css">
  <link rel="stylesheet" href="potree/libs/jstree/themes/mixed/style.css">

  <!-- App styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Potree dependencies (must load before potree.js) -->
  <script src="potree/libs/jquery/jquery-3.1.1.min.js"></script>
  <script src="potree/libs/spectrum/spectrum.js"></script>
  <script src="potree/libs/jquery-ui/jquery-ui.min.js"></script>
  <script src="potree/libs/other/BinaryHeap.js"></script>
  <script src="potree/libs/tween/tween.min.js"></script>
  <script src="potree/libs/d3/d3.js"></script>
  <script src="potree/libs/proj4/proj4.js"></script>
  <script src="potree/libs/openlayers3/ol.js"></script>
  <script src="potree/libs/i18next/i18next.js"></script>
  <script src="potree/libs/jstree/jstree.js"></script>
  <script src="potree/libs/copc/index.js"></script>
  <script src="potree/build/potree/potree.js"></script>
  <script src="potree/libs/plasio/js/laslaz.js"></script>

  <!-- Potree render container -->
  <div class="potree_container" style="position:absolute;width:100%;height:100%;left:0;top:0;">
    <div id="potree_render_area" style="background:#0d0f1a;"></div>
    <div id="potree_sidebar_container"></div>
  </div>

  <!-- Peer presence overlay (top-right corner) -->
  <div id="peer-overlay">
    <div id="peer-header">
      <span id="conn-label">Connecting…</span>
      <span id="conn-dot" class="dot disconnected"></span>
    </div>
    <ul id="peer-list"></ul>
  </div>

  <!-- Viewer init + sync wiring (ES module so we can import Three.js) -->
  <script type="module">
    import * as THREE from '/potree/libs/three.js/build/three.module.js';
    import { initSync } from '/viewer.js';

    window.viewer = new Potree.Viewer(document.getElementById('potree_render_area'));

    viewer.setEDLEnabled(true);
    viewer.setFOV(60);
    viewer.setPointBudget(2_000_000);

    viewer.loadGUI(() => {
      viewer.setLanguage('en');
      $('#menu_appearance').next().show();
    });

    // SoFi Stadium COPC dataset — elevation coloring applied immediately on load
    Potree.loadPointCloud(
      'https://s3.amazonaws.com/hobu-lidar/sofi.copc.laz',
      'SoFi Stadium',
      (e) => {
        viewer.scene.addPointCloud(e.pointcloud);

        const mat = e.pointcloud.material;
        mat.size = 1;
        mat.pointSizeType = Potree.PointSizeType.ADAPTIVE;
        mat.activeAttributeName = 'elevation';

        viewer.fitToScreen(0.5);
        viewer.setDescription('SoFi Stadium · Collaborative Viewer');
      }
    );

    // Start WebSocket camera sync after viewer is ready
    initSync(viewer, THREE);
  </script>
</body>
</html>
